# Render Blueprint. Em render.com: New + > Blueprint > aponta para este repo.
# NÃO cria base de dados (o free tier do Render só permite uma por conta).
# Usa um Postgres externo gratuito (ex.: Neon — neon.tech) e define o DATABASE_URL
# manualmente no dashboard do serviço (Environment).
services:
  - type: web
    name: travel-costs
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build
    # migrate deploy é idempotente; aplica a migração antes de arrancar.
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        sync: false # definir no dashboard: connection string do Neon (com ?sslmode=require)
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NODE_VERSION
        value: "20"
