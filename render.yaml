# Render Blueprint. Em render.com: New + > Blueprint > aponta para este repo.
# Cria automaticamente a base de dados Postgres e o serviço web, ligando o DATABASE_URL.
databases:
  - name: travel-costs-db
    databaseName: travel_costs
    plan: free

services:
  - type: web
    name: travel-costs
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build
    # migrate deploy é idempotente; aplica a migração antes de arrancar.
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: travel-costs-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NODE_VERSION
        value: "20"
